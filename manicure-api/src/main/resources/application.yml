spring:
  application:
    name: manicure-api
  datasource:
    url: jdbc:postgresql://localhost:5432/manicure_db
    username: davids
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format-sql: true
  flyway:
    enable: true
    locations: classpath:db/migration
    baseline-migrate: true

serve:
  port: 8080
